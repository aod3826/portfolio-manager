<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep indigo to violet -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="50%"  stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <!-- Card shine gradient -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>

    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Glossy overlay -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Star/sparkle filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded rect clip for icon -->
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── Base background ── -->
  <g clip-path="url(#iconClip)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle noise/texture dots -->
    <circle cx="80"  cy="80"  r="120" fill="#6366f1" opacity="0.08"/>
    <circle cx="440" cy="420" r="140" fill="#ec4899" opacity="0.08"/>
    <circle cx="460" cy="60"  r="80"  fill="#8b5cf6" opacity="0.06"/>

    <!-- ── Portfolio card stack (3 layered cards) ── -->

    <!-- Card 3 — back, pink accent, rotated right -->
    <g transform="translate(256,268) rotate(12)">
      <rect x="-108" y="-72" width="216" height="144" rx="16" fill="url(#card2)" opacity="0.75"/>
      <!-- fake image placeholder bar -->
      <rect x="-94" y="-58" width="134" height="64" rx="8" fill="#ffffff" opacity="0.15"/>
      <!-- fake text lines -->
      <rect x="-94" y="16"  width="100" height="9" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="-94" y="30"  width="70"  height="7" rx="4" fill="#ffffff" opacity="0.18"/>
    </g>

    <!-- Card 2 — middle, purple, slight left rotation -->
    <g transform="translate(256,262) rotate(-8)">
      <rect x="-108" y="-72" width="216" height="144" rx="16" fill="url(#card3)" opacity="0.85"/>
      <rect x="-94" y="-58" width="134" height="64" rx="8" fill="#ffffff" opacity="0.15"/>
      <rect x="-94" y="16"  width="90"  height="9" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="-94" y="30"  width="60"  height="7" rx="4" fill="#ffffff" opacity="0.18"/>
    </g>

    <!-- Card 1 — front, indigo, flat center -->
    <g transform="translate(256,254)" filter="url(#softglow)">
      <rect x="-116" y="-80" width="232" height="160" rx="18" fill="url(#card1)"/>

      <!-- image placeholder -->
      <rect x="-100" y="-64" width="144" height="76" rx="10" fill="#ffffff" opacity="0.18"/>
      <!-- tiny landscape icon inside image area -->
      <circle cx="-34" cy="-38" r="14" fill="#fbbf24" opacity="0.7"/>
      <polygon points="-100,-20 -74,-52 -48,-30 -20,-48 10,-20" fill="#10b981" opacity="0.5"/>

      <!-- title bar -->
      <rect x="-100" y="24"  width="110" height="11" rx="5" fill="#ffffff" opacity="0.5"/>
      <!-- subtitle bar -->
      <rect x="-100" y="42"  width="76"  height="8"  rx="4" fill="#ffffff" opacity="0.30"/>
      <!-- tag chip -->
      <rect x="-100" y="57"  width="42"  height="14" rx="7" fill="#ec4899" opacity="0.7"/>
      <rect x="-52"  y="57"  width="36"  height="14" rx="7" fill="#8b5cf6" opacity="0.7"/>

      <!-- action button hint -->
      <rect x="52"  y="-64" width="48"  height="22" rx="11" fill="#ffffff" opacity="0.20"/>
      <rect x="56"  y="-59" width="16"  height="4"  rx="2"  fill="#ffffff" opacity="0.6"/>
      <rect x="56"  y="-51" width="36"  height="4"  rx="2"  fill="#ffffff" opacity="0.4"/>
    </g>

    <!-- ── Sparkle accents ── -->
    <!-- Top-left sparkle -->
    <g filter="url(#glow)" opacity="0.9">
      <polygon points="96,100 99,112 111,115 99,118 96,130 93,118 81,115 93,112" fill="#f0abfc"/>
    </g>
    <!-- Top-right sparkle -->
    <g filter="url(#glow)" opacity="0.8">
      <polygon points="400,88 402,96 410,98 402,100 400,108 398,100 390,98 398,96" fill="#fbbf24"/>
    </g>
    <!-- Bottom-left small dot -->
    <circle cx="118" cy="400" r="6" fill="#ec4899" opacity="0.7" filter="url(#glow)"/>
    <!-- Bottom-right sparkle -->
    <g filter="url(#glow)" opacity="0.7">
      <polygon points="388,388 390,396 398,398 390,400 388,408 386,400 378,398 386,396" fill="#6ee7b7"/>
    </g>

    <!-- ── Glossy top-half sheen ── -->
    <rect width="512" height="512" rx="112" fill="url(#gloss)"/>
  </g>
</svg>
